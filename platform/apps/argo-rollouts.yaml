apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-rollouts
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/getsan4u/ibs-eks-argo-platform.git
    targetRevision: main
    path: platform/components/argo-rollouts

  destination:
    server: https://kubernetes.default.svc
    namespace: argo-rollouts

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true