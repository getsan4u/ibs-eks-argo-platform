apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-appproject
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/getsan4u/ibs-eks-argo-platform.git
    targetRevision: main
    path: platform/components/argocd-workloads

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true