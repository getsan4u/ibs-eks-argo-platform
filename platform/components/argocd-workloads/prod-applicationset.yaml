apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: prod-workload-repos
  namespace: argocd
spec:
  generators:
    - list:
        # The GitHub SCM generator only supports organizations. Add personal
        # account repositories here after they contain the production overlay.
        elements: []

  template:
    metadata:
      name: '{{ name }}-prod'
      labels:
        environment: prod
        managed-by: applicationset

    spec:
      project: prod-workloads

      source:
        repoURL: '{{ repoURL }}'
        targetRevision: '{{ revision }}'
        path: deploy/overlays/prod

      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ name }}'

      syncPolicy:
        automated:
          prune: true
          selfHeal: true

        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
