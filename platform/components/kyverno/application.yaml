apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-helm
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://kyverno.github.io/kyverno/
    chart: kyverno
    targetRevision: 3.2.6

  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno

  syncPolicy:
    automated:
      prune: true
      selfHeal: true