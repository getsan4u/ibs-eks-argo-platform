apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-policies
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/getsan4u/ibs-eks-argo-platform.git
    targetRevision: main
    path: platform/components/policy

  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno

  syncPolicy:
    automated:
      prune: true
      selfHeal: true